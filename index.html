<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        <div class="scoreboard">
            <div class="score">
                <span class="player-label">Player</span>
                <span class="player-score">0</span>
            </div>
            <div class="score">
                <span class="computer-label">Computer</span>
                <span class="computer-score">0</span>
            </div>
        </div>
        
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        
        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Mouse - Move left paddle vertically</p>
            <p>⬆️⬇️ Arrow Keys - Move left paddle up/down</p>
            <p>Computer controls the right paddle automatically</p>
            <p style="margin-top: 10px; font-size: 14px;">First to 11 points wins!</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
